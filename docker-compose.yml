services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: thesisarc
      POSTGRES_PASSWORD: thesisarc_dev
      POSTGRES_DB: thesisarc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://thesisarc:thesisarc_dev@db:5432/thesisarc
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
