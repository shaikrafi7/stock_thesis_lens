app = "thesisarc-web"
primary_region = "iad"

[build]
  [build.args]
    NEXT_PUBLIC_API_URL = "https://thesisarc-api.fly.dev"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 3000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.http_checks]
    interval = "30s"
    timeout = "10s"
    grace_period = "15s"
    method = "get"
    path = "/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
