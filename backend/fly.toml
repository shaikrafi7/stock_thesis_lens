app = "thesisarc-api"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////data/stock_thesis.db"

[mounts]
  source = "thesisarc_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.http_checks]
    interval = "30s"
    timeout = "10s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
