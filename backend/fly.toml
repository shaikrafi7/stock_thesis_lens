app = "thesisarc-api"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite:////data/stock_thesis.db"

[mounts]
  source = "thesisarc_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
